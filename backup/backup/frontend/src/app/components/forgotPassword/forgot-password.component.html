<div class="main-wrapper">
  <div class="login-card">


    <div class="left-section">
      <img src="Login.png" class="left-image" alt="Forgot Password Visual">
    </div>


    <div class="right-section">
      <div class="form-wrapper">

        <h2 class="form-title">Forgot Password</h2>


<!-- STEP 1 -->
<div *ngIf="step === 1">
  <input class="email1"
    type="email"
    [(ngModel)]="email"
    placeholder="Enter your registered email" />

  <button (click)="sendOtp()" [disabled]="isLoading">
    {{ isLoading ? 'Sending...' : 'Send OTP' }}
  </button>
</div>

<!-- STEP 2 -->
<div *ngIf="step === 2" class="otp-section">
  <input
    class="otp-input"
    type="text"
    [(ngModel)]="otp"
    maxlength="6"
    placeholder="Enter OTP" />

  <button (click)="verifyOtp()" [disabled]="isLoading">
    {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
  </button>
</div>

<!-- STEP 3 -->
<div *ngIf="step === 3">
  <input
    type="password"
    [(ngModel)]="newPassword"
    placeholder="New Password" />

  <input
    type="password"
    [(ngModel)]="confirmPassword"
    placeholder="Confirm Password" />

  <button (click)="resetPassword()" [disabled]="isLoading">
    {{ isLoading ? 'Submitting...' : 'Submit' }}
  </button>
</div>

        <p class="success" *ngIf="message">{{ message }}</p>
        <p class="error" *ngIf="error">{{ error }}</p>

        <div class="bottom-link">
          <a routerLink="/login">Back to Login</a>
        </div>

      </div>
    </div>

  </div>
</div>
